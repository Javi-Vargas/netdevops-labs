server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # SPA fallback: unknown paths serve index.html so client-side routing
    # and deep links work instead of 404ing.
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Long-lived caching for fingerprinted build assets.
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
}
